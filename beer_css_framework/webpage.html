<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Monitor | Cloud-Native IoT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.css"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>"
    />
    <meta name="theme-color" content="#ff3d00" />
    <style>
      :root {
        --primary: #ff3d00;
        --secondary: #455a64;
      }
      body {
        background: radial-gradient(circle at 50% 50%, #1e1e28 0%, #0d0d12 100%) !important;
        font-family: 'Outfit', sans-serif !important;
        min-height: 100vh;
      }
      article.border {
        background: rgba(30, 30, 32, 0.45) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }
      article.border:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        border-color: rgba(255, 255, 255, 0.15) !important;
      }
      .graph-wrapper .chart-container {
        position: relative;
        width: 100%;
        height: 260px;
      }
      .critical-bg {
        animation: alertGlow 2s infinite alternate;
        background: linear-gradient(135deg, #b71c1c, #880e4f) !important;
        box-shadow: 0 0 15px rgba(183, 28, 28, 0.6);
        border: 1px solid rgba(244, 67, 54, 0.5) !important;
      }
      @keyframes alertGlow {
        from {
          box-shadow: 0 0 10px rgba(183, 28, 28, 0.4);
          filter: brightness(0.9);
        }
        to {
          box-shadow: 0 0 25px rgba(183, 28, 28, 0.8);
          filter: brightness(1.15);
        }
      }
    </style>
  </head>
  <body class="dark">
    <header class="primary shadow">
      <nav>
        <button class="circle transparent"><i>local_fire_department</i></button>
        <h5 class="max">LAB SAFETY MONITOR</h5>
        <div class="field round fill prefix margin">
          <i class="front">sensors</i>
          <div class="max">Group 8</div>
        </div>
      </nav>
    </header>
    <main class="responsive padding">
      <div
        class="grid"
        id="status-grid"
        hx-get="/api/status"
        hx-trigger="load"
        hx-swap="outerHTML"
      >
        <div class="s12 center-align padding">
          <progress class="circle"></progress>
          <p>Đang kết nối tới máy chủ cảm biến...</p>
        </div>
      </div>
      <div class="space"></div>
      <div class="grid">
        <div class="s12">
          <article class="border round padding">
            <div class="row">
              <i class="primary-text">timeline</i>
              <div class="max"><h5>Diễn biến sự cố (Thời gian thực)</h5></div>
              <button class="chip primary">LIVE</button>
            </div>
            <div class="graph-wrapper margin">
              <!-- ── Legend + controls row ── -->
              <div class="row" style="gap:6px;justify-content:space-between;margin-bottom:10px;align-items:center;">
                <div style="display:flex;gap:14px;font-size:12px;color:#9e9e9e;">
                  <span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:18px;height:3px;background:#ff5722;border-radius:2px;display:inline-block;"></span>
                    Nhiệt độ (°C)
                  </span>
                  <span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:14px;height:14px;background:#2196f3;border-radius:2px;opacity:0.8;display:inline-block;"></span>
                    Khói (ADC)
                  </span>
                </div>
                <div style="display:flex;gap:6px;align-items:center;">
                  <span id="incident-label" style="font-size:12px;color:#9e9e9e;"></span>
                  <button id="btn-live" class="chip primary" onclick="loadIncident('latest')">LIVE</button>
                  <button id="btn-flat" class="chip primary" onclick="setZoom('flat')">Mặc định</button>
                  <button id="btn-detail" class="chip outline" onclick="setZoom('detail')">Zoom</button>
                </div>
              </div>
              <!-- ── Chart canvas ── -->
              <div class="chart-container">
                <canvas id="arduno-chart"></canvas>
              </div>
            </div>
          </article>
        </div>
      </div>
      <div class="space"></div>
      <div class="grid">
        <div class="s12">
          <article class="border round">
            <div class="row padding">
              <i class="primary-text">history</i>
              <h5 class="max">Lịch sử cảnh báo</h5>
              <button
                class="circle transparent"
                hx-get="/api/history"
                hx-target="#history-body"
                hx-swap="outerHTML"
              >
                <i>refresh</i>
              </button>
            </div>
            <div style="overflow-y: auto; max-height: 320px">
              <table class="border left-align" style="width: 100%">
                <thead
                  style="
                    position: sticky;
                    top: 0;
                    z-index: 1;
                    background: rgba(30, 30, 32, 0.95);
                    backdrop-filter: blur(8px);
                  "
                >
                  <tr>
                    <th>ID</th>
                    <th>Bắt đầu</th>
                    <th>Kết thúc</th>
                    <th>Đỉnh nhiệt</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody
                  id="history-body"
                  hx-get="/api/history"
                  hx-trigger="load"
                  hx-swap="outerHTML"
                >
                  <tr>
                    <td colspan="5" class="center-align">
                      Đang tải lịch sử...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </article>
        </div>
      </div>
    </main>
    <footer class="padding center-align transparent">
      <div class="row center-align">
        <img
          src="https://turso.tech/symbol-sdk.svg"
          style="height: 20px"
          class="margin"
          alt="Turso"
        />
        <span class="italic">Powered by Turso Edge DB &amp; Vercel Serverless</span>
      </div>
    </footer>

    <!-- ══════════════════════════════════════════════════════════════════
         CHART.JS CONTROLLER
         Owns: polling, normalization, rendering, zoom, incident switching.
         HTMX owns: status cards, history table rows.
         Neither interferes with the other.
    ══════════════════════════════════════════════════════════════════ -->
    <script>
    (function () {
      'use strict';

      // ── State ──────────────────────────────────────────────────────────
      let currentIncidentId = 'latest';
      let currentZoom       = 'flat';   // 'flat' | 'detail'
      let rawTemp  = [];
      let rawSmoke = [];
      let chart    = null;
      let pollTimer = null;

      // ── Normalization (mirrors Python logic, runs in browser) ──────────
      function normalize(arr, minSpan) {
        if (!arr.length) return [];
        let mn = Math.min(...arr);
        let mx = Math.max(...arr);
        let span = mx - mn;
        if (span < minSpan) {
          mn = Math.max(0, mn - (minSpan - span) / 2);
          mx = mn + minSpan;
          span = minSpan;
        }
        return arr.map(v => (v - mn) / span * 100);
      }

      // ── Fetch data + update chart ──────────────────────────────────────
      async function fetchAndUpdate() {
        try {
          const res  = await fetch(`/api/analytics/data/${currentIncidentId}`);
          if (!res.ok) return;
          const data = await res.json();

          rawTemp  = data.temp  || [];
          rawSmoke = data.smoke || [];

          const minSpanT = currentZoom === 'detail' ? 2  : 10;
          const minSpanS = currentZoom === 'detail' ? 50 : 200;
          const normT = normalize(rawTemp,  minSpanT);
          const normS = normalize(rawSmoke, minSpanS);

          if (!chart) initChart();

          chart.data.labels           = data.times || [];
          chart.data.datasets[0].data = normS;   // bars
          chart.data.datasets[1].data = normT;   // line
          chart.update('none');

          // Update status glow on the article card
          const card = document.querySelector('#graph-card');
          if (card) {
            card.classList.toggle('critical-bg', data.status === 'critical');
          }
        } catch (e) {
          console.warn('chart fetch error', e);
        }
      }

      // ── Switch to a specific incident (called by history row onclick) ──
      window.loadIncident = function (id) {
        currentIncidentId = String(id);
        const lbl = document.getElementById('incident-label');
        const btnLive = document.getElementById('btn-live');
        if (id === 'latest') {
          if (lbl)     lbl.textContent = '';
          if (btnLive) btnLive.className = 'chip primary';
        } else {
          if (lbl)     lbl.textContent = `Sự cố #${id}`;
          if (btnLive) btnLive.className = 'chip outline';
        }
        fetchAndUpdate();  // immediate update, no waiting for next tick
      };

      // ── Zoom toggle (pure client-side, no network round-trip) ─────────
      window.setZoom = function (mode) {
        currentZoom = mode;
        document.getElementById('btn-flat').className   = mode === 'flat'   ? 'chip primary' : 'chip outline';
        document.getElementById('btn-detail').className = mode === 'detail' ? 'chip primary' : 'chip outline';
        fetchAndUpdate();
      };

      // ── Chart.js initialisation ────────────────────────────────────────
      function initChart() {
        const ctx = document.getElementById('arduno-chart').getContext('2d');
        chart = new Chart(ctx, {
          data: {
            labels:   [],
            datasets: [
              // [0] Smoke — BAR
              {
                type:            'bar',
                label:           'Khói',
                data:            [],
                backgroundColor: 'rgba(33,150,243,0.72)',
                borderColor:     'rgba(33,150,243,0.0)',
                borderRadius:    3,
                order:           2,
              },
              // [1] Temperature — LINE
              {
                type:            'line',
                label:           'Nhiệt độ',
                data:            [],
                borderColor:     '#ff5722',
                backgroundColor: 'rgba(255,87,34,0.07)',
                borderWidth:     2.4,
                pointRadius:     3,
                pointHoverRadius:5,
                pointBackgroundColor: '#ff5722',
                pointBorderColor:     '#1e1e20',
                pointBorderWidth:     1.5,
                tension:         0.4,
                fill:            true,
                order:           1,
              },
            ],
          },
          options: {
            animation:   false,
            responsive:  true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#16181d',
                borderColor:     'rgba(255,255,255,0.13)',
                borderWidth:     1,
                titleColor:      '#ffffff',
                titleFont:       { family: 'Outfit', size: 13, weight: '600' },
                bodyColor:       '#e0e0e0',
                bodyFont:        { family: 'Outfit', size: 12 },
                padding:         12,
                callbacks: {
                  label: function (ctx) {
                    const i   = ctx.dataIndex;
                    const pct = ctx.parsed.y.toFixed(0);
                    if (ctx.dataset.label === 'Khói') {
                      const adc = rawSmoke[i] !== undefined ? rawSmoke[i].toFixed(0) : '—';
                      return `  Khói: ${adc} ADC  (${pct}%)`;
                    } else {
                      const deg = rawTemp[i]  !== undefined ? rawTemp[i].toFixed(1)  : '—';
                      return `  Nhiệt độ: ${deg}°C  (${pct}%)`;
                    }
                  },
                },
              },
            },
            scales: {
              x: {
                ticks: {
                  color:      '#9e9e9e',
                  font:       { family: 'Outfit', size: 11 },
                  maxTicksLimit: 10,
                  maxRotation: 0,
                },
                grid: { color: 'rgba(255,255,255,0.05)' },
              },
              y: {
                min:  0,
                max:  100,
                ticks: {
                  color:    '#9e9e9e',
                  font:     { family: 'Outfit', size: 11 },
                  callback: v => v + '%',
                  stepSize: 50,
                },
                grid: {
                  color:     'rgba(255,255,255,0.10)',
                  lineWidth: 1,
                },
              },
            },
          },
        });
      }

      // ── Bootstrap ─────────────────────────────────────────────────────
      // Init chart immediately on DOM ready, then poll every 5 s
      initChart();
      fetchAndUpdate();
      pollTimer = setInterval(fetchAndUpdate, 5000);

    })();
    </script>
  </body>
</html>
